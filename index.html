<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XSContainers</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>XSContainers</h1>
        <button id="theme-toggle" type="button">Switch to Dark Theme</button>
      </header>

      <section class="actions">
        <button id="create-container" type="button">Create Container</button>
        <button id="upload-file" type="button">Upload File</button>
        <input id="file-input" type="file" hidden />
      </section>

      <section class="panel">
        <h2>Containers</h2>
        <ul id="container-list"></ul>
      </section>

      <section class="panel">
        <h2>Stored Files</h2>
        <ul id="file-list"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
